name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Markdown style
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Verify links
        uses: lycheeverse/lychee-action@v2
        with:
          # gnu.org blocks GitHub's shared egress IPs, answering our GPL-2
          # link with 429 or simply dropping the request until it times out.
          # Both outcomes are about the runner's IP, not the link: the same
          # URL returns 200 from an ordinary host, and a GPL permalink does
          # not rot. Exclude it rather than let it flip the build red at
          # random. 429 stays accepted for any other throttling host.
          args: >-
            --no-progress
            --verbose
            --accept 200..=299,429
            --max-retries 3
            --retry-wait-time 5
            --exclude '^https://www\.gnu\.org/'
            './**/*.md'
          fail: true
