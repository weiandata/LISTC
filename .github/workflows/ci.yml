name: Repository checks

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  markdown:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify Markdown style
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

      - name: Verify links
        uses: lycheeverse/lychee-action@v2
        with:
          # 429 means the host answered but is throttling this runner --
          # gnu.org does that to GitHub's shared egress IPs, and it says
          # nothing about whether the link is alive. Retry, then accept it.
          args: >-
            --no-progress
            --verbose
            --accept 200..=299,429
            --max-retries 3
            --retry-wait-time 5
            './**/*.md'
          fail: true
